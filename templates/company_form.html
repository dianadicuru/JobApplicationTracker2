{% extends "base.html" %}

{% block content %}
<h2>{{ 'Edit' if company else 'Add' }} Company</h2>

<div class="form-card">
    <form method="POST">

        <div class="form-group">
            <label for="company_name">Company Name</label>
            <input type="text" id="company_name" name="company_name"
                   value="{{ company.company_name if company else '' }}" required>
        </div>

        <div class="form-group">
            <label for="industry">Industry</label>
            <input type="text" id="industry" name="industry"
                   value="{{ company.industry if company else '' }}">
        </div>

        <div class="form-group">
            <label for="website">Website</label>
            <input type="text" id="website" name="website"
                   value="{{ company.website if company else '' }}">
        </div>

        <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" name="city"
                   value="{{ company.city if company else '' }}">
        </div>

        <div class="form-group">
            <label for="state">State</label>
            <input type="text" id="state" name="state"
                   value="{{ company.state if company else '' }}">
        </div>

        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="4">{{ company.notes if company else '' }}</textarea>
        </div>

        <button type="submit" class="save-btn">Save</button>

    </form>
</div>
{% endblock %}
