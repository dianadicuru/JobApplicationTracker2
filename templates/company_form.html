{% extends "base.html" %}

{% block content %}
<h2>{{ 'Edit' if company else 'Add' }} Company</h2>

<form method="POST">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" value="{{ company.name if company else '' }}" required>

    <label for="location">Location</label>
    <input type="text" id="location" name="location" value="{{ company.location if company else '' }}">

    <label for="website">Website</label>
    <input type="text" id="website" name="website" value="{{ company.website if company else '' }}">

    <button type="submit">Save</button>
</form>
{% endblock %}
