{% extends "base.html" %}

{% block content %}
<h2>Job Match Result</h2>

<p><strong>Job Title:</strong> {{ job_title }}</p>
<p><strong>Required Skills:</strong> {{ required_skills | join(', ') }}</p>
<p><strong>Your Skills:</strong> {{ user_skills | join(', ') }}</p>
<p><strong>Matched Skills:</strong> {{ matched_skills | join(', ') }}</p>
<p><strong>Match Percentage:</strong> {{ percentage }}%</p>
{% endblock %}
